<!DOCTYPE html>
<html lang="en">

<head>
    <title>Create Your Account </title>
</head>

<body>
    <form class="card">

        <h1>Registration</h1>
        <h4>Please complete all field below</h4>

        <div class="card-body">
            <div class="field">
                <lebel for="name">Full Name</lebel>
                <input type="text" id="name" placeholder="Alvi Rahman">
            </div>

            <div class="field">
                <lebel for="postal ">Postal Code</lebel>
                <input type="number" id="postal" placeholder="10001">
            </div>

             <div class="field">
                <lebel for="dob ">Date Of Birth</lebel>
                <input type="date" id="dob" placeholder="25/05/2001">
                </div>

            <div class="field">
                <lebel for="email">Work Email</lebel>
                <input type="text" id="email" placeholder="alvi@company.com">
            </div>

            <div class="field">
                <lebel for="password">Password</lebel>
                <input type="text" id="password" placeholder="At Least 8 Characters">
            </div>

            <div class="field">
                <label for="country">Country</label>
                <select id="country">
                    <option>Select a country...</option>
                    <option>Bangladesh</option>
                    <option>India</option>
                    <option>Pakistan</option>
                    <option>United States</option>
                    <option>United Kingdom</option>
                </select>
            </div>

            <div class="button">
                <button type="Submit">Submit</button>
                <button type="reset">Reset</button>
            </div>

                  </div>
    </form>
</body>
</html>
