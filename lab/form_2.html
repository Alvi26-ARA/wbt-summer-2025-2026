<!DOCTYPE html>
<html lang="en">

<head>
    <title>Create Your Account </title>
</head>

<body>
    <form class="card">

        <h4>.Get Started</h4>
        <h1>Create your Workspace</h1>

        <div class="card-body">
            <div class="field">
                <lebel for="name">Full Name</lebel>
                <input type="text" id="name" placeholder="Alvi Rahman">
            </div>

            <div class="field">
                <lebel for="phone ">Phone Number</lebel>
                <input type="number" id="phone" placeholder="5551234567">
            </div>

             <div class="field">
                <lebel for="dob ">Date Of Birth</lebel>
                <input type="date" id="dob" placeholder="25/05/2001">
                </div>

            <div class="field">
                <lebel for="email">Work Email</lebel>
                <input type="text" id="email" placeholder="alvi@company.com">
            </div>

            <div class="field">
                <lebel for="password">Password</lebel>
                <input type="text" id="password" placeholder="At Least 8 Characters">
            </div>

            <label class="check">
            <input type="checkbox" name="email"> Email me product updates and tips
            <input type="checkbox" name="privecy"> I agree to the Terms and Privacy Policy
        </label>
        <div class="buttons">
          <div class="button">
                <button type="Submit">Create Workspace</button>
                <button type="reset">Reset</button>
            </div>
        </div>

            </div>

        </div>
    </form>
</body>
</html>
